<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Listing</title>
    <link rel="stylesheet" href="style.css" />
    <script src="main.js" defer type="module"></script>
  </head>
  <body>
    <header>
      <div id="shows-header" class="shows-header hidden">
        <label for="shows-search">Search shows: </label>
        <input type="text" id="shows-search" placeholder="Search shows..." />
        <p id="number-of-shows" class="number-of-shows"></p>
      </div>
      <div id="episodes-header" class="episodes-header hidden">
        <span id="back-arrow" class="back-arrow">&leftarrow;back</span>
        <select id="shows-drop-down" class="shows-drop-down"></select>
        <select id="episodes-drop-down" class="episodes-drop-down"></select>

        <input
          type="text"
          id="episodes-search"
          placeholder="Search episodes..."
        />
        <p id="number-of-episodes" class="number-of-episodes"></p>
      </div>
    </header>
    <main>
      <section id="shows" class="shows hidden"></section>
      <section id="episodes" class="episodes hidden"></section>
    </main>

    <template id="show-card-template">
      <div class="show-card">
        <h1></h1>
        <div class="show-content">
          <img src="" alt="" />
          <p class="summary" class="show-summary"></p>
          <div class="show-info">
            <p class="rated"><b>Rated: </b><span></span></p>
            <p class="genres"><b>Genres: </b><span></span></p>
            <p class="status"><b>Status: </b><span></span></p>
            <p class="runtime"><b>Runtime: </b><span></span></p>
          </div>
        </div>
      </div>
    </template>
    <template id="episode-card-template">
      <section class="episode-card">
        <h3></h3>
        <div class="episode-info">
          <img src="" alt="" />
          <p></p>
          <a href="" target="_blank">View on TVMaze</a>
        </div>
      </section>
    </template>
  </body>
</html>
